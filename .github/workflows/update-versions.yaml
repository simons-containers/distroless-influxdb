name: Update versions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Fetch latest versions
        run: |
          INFLUXDB=$(git ls-remote --tags https://github.com/influxdata/influxdb.git/  \
            | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's/^v//' | sort -V | grep '^2' | tail -1)

          set -u
          yq -i ".influxdb= \"$INFLUXDB\"" versions.yaml
          git diff versions.yaml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: update-versions
          delete-branch: true
          title: Update InfluxDB
          commit-message: Update InfluxDB
